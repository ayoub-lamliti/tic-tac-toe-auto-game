<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta name="description"
        content="Tic Tac Toe — Play against a friend or unbeatable CPU. Supports 3×3 up to 15×15 boards." />
    <title>TIC TAC TOE</title>
    <link rel="stylesheet" href="./src/style.css" />
    <link rel="icon" href="./images/tic-tac.ico" type="image/tic-tac-icon" />
</head>

<body>
    <div id="app">

        <!-- ───── SETUP SCREEN ───── -->
        <div id="setup-screen">

            <h1 class="setup-title">TIC<br>TAC<br>TOE</h1>
            <p class="setup-subtitle">// CHOOSE YOUR SETTINGS //</p>

            <!-- Player choice -->
            <div class="setup-card">
                <span class="setup-label">PLAY AS</span>
                <div class="radio-group">
                    <input type="radio" id="pick-x" name="player" value="x" checked />
                    <label class="radio-label" for="pick-x">
                        <span class="symbol">✕</span> PLAYER X
                    </label>
                    <input type="radio" id="pick-o" name="player" value="o" />
                    <label class="radio-label" for="pick-o">
                        <span class="symbol">○</span> PLAYER O
                    </label>
                </div>
            </div>

            <!-- Game mode -->
            <div class="setup-card">
                <span class="setup-label">GAME MODE</span>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-text">CPU OPPONENT</div>
                        <div class="toggle-sub">vs friend when off</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-cpu" />
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- Difficulty (shown when CPU on) -->
            <div class="setup-card hidden" id="difficulty-row">
                <span class="setup-label">CPU DIFFICULTY</span>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-text" id="diff-label">HARD MODE</div>
                        <div class="toggle-sub">minimax AI on 3×3</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="toggle-difficulty" />
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- Board size -->
            <div class="setup-card">
                <span class="setup-label">BOARD SIZE</span>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-text">GRID DIMENSIONS</div>
                        <div class="toggle-sub" id="size-hint">3×3 — 3 in a row to win</div>
                    </div>
                    <div class="stepper">
                        <button type="button" id="decrement" aria-label="Decrease">−</button>
                        <input type="number" id="quantity" min="3" max="15" value="3" readonly
                            aria-label="Board size" />
                        <button type="button" id="increment" aria-label="Increase">+</button>
                    </div>
                </div>
            </div>

            <!-- Start -->
            <button type="button" id="start-btn"><span>▶ PLAY NOW</span></button>

        </div>
        <!-- ───── END SETUP ───── -->


        <!-- ───── GAME SCREEN ───── -->
        <div id="game-screen" class="hidden">

            <!-- Header -->
            <div class="game-header">
                <div class="turn-display">
                    <div class="turn-text player-x" id="turn-indicator">X TURN</div>
                </div>

                <div class="scores">
                    <div class="score-chip x">
                        <span class="sym">✕</span>
                        <span class="num" id="score-x">0</span>
                    </div>
                    <div class="score-chip o">
                        <span class="sym">○</span>
                        <span class="num" id="score-o">0</span>
                    </div>
                </div>

                <button class="icon-btn" id="exit-btn" title="Exit to menu" aria-label="Exit">✕</button>
            </div>

            <!-- Board -->
            <div id="grid" role="grid" aria-label="Tic Tac Toe board"></div>

            <!-- Footer -->
            <div class="game-footer">
                <button class="footer-btn" id="reset-btn">↺ NEW ROUND</button>
            </div>

        </div>
        <!-- ───── END GAME ───── -->


        <!-- ───── MODAL ───── -->
        <div id="modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-box">
                <span id="modal-icon">◈</span>
                <h2 id="modal-title">GAME OVER</h2>
                <p id="modal-message">Match complete.</p>
                <button id="modal-ok">▶ NEXT ROUND</button>
            </div>
        </div>
        <!-- ───── END MODAL ───── -->

    </div>

    <script type="module" src="./src/ui.js"></script>

    <!-- Live size hint -->
    <script>
        const q = document.getElementById('quantity');
        const hint = document.getElementById('size-hint');
        const dl = document.getElementById('diff-label');
        const diffSub = document.querySelector('#difficulty-row .toggle-sub');

        function updateHint() {
            const v = parseInt(q.value);
            const w = Math.min(v, 5);
            hint.textContent = `${v}×${v} — ${w} in a row to win`;
            if (dl) {
                const isHard = !document.getElementById('toggle-difficulty').checked;
                dl.textContent = isHard ? 'HARD MODE' : 'EASY MODE';
                if (diffSub) diffSub.textContent = v <= 3 ? 'minimax AI on 3×3' : 'smart heuristic AI';
            }
        }

        document.getElementById('decrement').addEventListener('click', () => setTimeout(updateHint, 0));
        document.getElementById('increment').addEventListener('click', () => setTimeout(updateHint, 0));
        document.getElementById('toggle-difficulty')?.addEventListener('change', updateHint);
    </script>
</body>

</html>
